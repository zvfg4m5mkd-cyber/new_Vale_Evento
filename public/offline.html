<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>离线模式 - XGSS事件管理</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f8fafc; color: #0f172a; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      main { max-width: 560px; margin: 24px; padding: 32px; border-radius: 24px; background: white; box-shadow: 0 18px 50px rgba(15, 23, 42, .08); border: 1px solid #e2e8f0; }
      h1 { margin: 0 0 12px; font-size: 24px; }
      p { margin: 0; line-height: 1.7; color: #475569; }
      a { color: #0f172a; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <h1>当前处于离线模式</h1>
      <p>设备健康与事件管理原型已经支持PWA缓存。首次在线打开并完成缓存后，可在离线状态下继续访问已缓存的页面。请恢复网络后刷新以获取最新版本。</p>
    </main>
  </body>
</html>
